spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:housekeeping2}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Keycloak - resource server JWT validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/housekeeping/protocol/openid-connect/certs

# Keycloak Admin API (for user management proxy)
keycloak.admin.url=http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}
keycloak.admin.realm=housekeeping
keycloak.admin.username=${KEYCLOAK_ADMIN_USER:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
