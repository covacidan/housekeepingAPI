jenkins:
  systemMessage: "Housekeeping Jenkins - configured automatically"
  numExecutors: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "DB_USER"
              secret: "${DB_USER}"
              description: "Database username"
          - string:
              scope: GLOBAL
              id: "DB_PASSWORD"
              secret: "${DB_PASSWORD}"
              description: "Database password"
          - string:
              scope: GLOBAL
              id: "DB_NAME"
              secret: "${DB_NAME}"
              description: "Database name"
          - string:
              scope: GLOBAL
              id: "JWT_SECRET"
              secret: "${JWT_SECRET}"
              description: "JWT signing secret"
          - string:
              scope: GLOBAL
              id: "ADMIN_EMAIL"
              secret: "${ADMIN_EMAIL}"
              description: "App admin email"
          - string:
              scope: GLOBAL
              id: "ADMIN_PASSWORD"
              secret: "${ADMIN_PASSWORD}"
              description: "App admin password"

jobs:
  - script: |
      pipelineJob('housekeeping-api') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/covacidan/housekeepingAPI.git')
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }
  - script: |
      pipelineJob('housekeeping-ui') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/covacidan/housekeepingUI.git')
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }
