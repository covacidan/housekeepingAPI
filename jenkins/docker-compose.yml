services:
  jenkins:
    build: .
    image: housekeeping-jenkins
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8083:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - housekeeping_net

volumes:
  jenkins_data:
    name: jenkins_data

networks:
  housekeeping_net:
    external: true
    name: housekeeping_net
