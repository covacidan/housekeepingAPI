services:
  postgres:
    image: postgres:15-alpine
    container_name: housekeeping_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - housekeeping_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: housekeeping_api
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - housekeeping_net
    restart: unless-stopped

  ui:
    build: ../housekeepingUI
    container_name: housekeeping_ui
    ports:
      - "8082:80"
    depends_on:
      - api
    networks:
      - housekeeping_net
    restart: unless-stopped

volumes:
  postgres_data:
    external: true
    name: housekeeping2_postgres_data

networks:
  housekeeping_net:
    external: true
    name: housekeeping_net
