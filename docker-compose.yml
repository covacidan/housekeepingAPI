# housekeepingAPI/docker-compose.yml
#
# This file manages ONLY the application containers (api + ui).
# PostgreSQL and Keycloak are provisioned by Terraform (housekeepingTF).
# Run `make apply` in housekeepingTF/environments/dev before starting these.

services:
  api:
    build: .
    image: housekeeping-api:latest
    container_name: housekeeping_api
    environment:
      DB_HOST: housekeeping_postgres
      DB_NAME: ${DB_NAME}
      # DB credentials are fetched from Vault by the API at startup via AppRole.
      # Set VAULT_ADDR, VAULT_ROLE_ID, VAULT_SECRET_ID to enable dynamic creds.
      # Fallback static credentials below are used when Vault is not configured.
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      KEYCLOAK_HOST: housekeeping_keycloak
      KEYCLOAK_PORT: 8080
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Vault AppRole credentials (Phase 2 — after Vault integration in the API)
      VAULT_ADDR: ${VAULT_ADDR:-http://housekeeping_vault:8200}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
    ports:
      - "8081:8080"
    networks:
      - housekeeping_net
    restart: unless-stopped

  ui:
    build: ../housekeepingUI
    container_name: housekeeping_ui
    ports:
      - "8082:80"
    depends_on:
      - api
    networks:
      - housekeeping_net
    restart: unless-stopped

networks:
  housekeeping_net:
    external: true
    name: housekeeping_net
